routing:
  # Which model to use based on task complexity
  strategy: auto  # auto | primary_only | fast_only | alternative
  complexity_threshold:
    simple: fast        # autocomplete, commit msgs, classification
    medium: primary     # code gen, review, refactoring
    complex: primary    # architecture, multi-file changes

